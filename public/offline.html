<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - MBUZENK ZETRO</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(to bottom, #f8fafc, #ffffff);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      text-align: center;
      max-width: 400px;
    }
    
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, #f97316, #dc2626);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .icon svg {
      width: 40px;
      height: 40px;
      color: white;
    }
    
    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 12px;
    }
    
    p {
      font-size: 16px;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    
    .tips {
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
      text-align: left;
    }
    
    .tips h3 {
      font-size: 14px;
      font-weight: 600;
      color: #ea580c;
      margin-bottom: 8px;
    }
    
    .tips ul {
      list-style: none;
      font-size: 13px;
      color: #9a3412;
    }
    
    .tips li {
      padding: 4px 0;
      padding-left: 20px;
      position: relative;
    }
    
    .tips li::before {
      content: '•';
      position: absolute;
      left: 8px;
      color: #f97316;
    }
    
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      background: linear-gradient(to right, #f97316, #dc2626);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    
    .button:hover {
      opacity: 0.9;
    }
    
    .contact {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #e2e8f0;
    }
    
    .contact p {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 8px;
    }
    
    .contact a {
      color: #f97316;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3m8.293 8.293l1.414 1.414" />
      </svg>
    </div>
    
    <h1>Anda Sedang Offline</h1>
    <p>Sepertinya koneksi internet Anda terputus. Silakan periksa koneksi dan coba lagi.</p>
    
    <div class="tips">
      <h3>Tips:</h3>
      <ul>
        <li>Periksa koneksi WiFi atau data seluler Anda</li>
        <li>Coba refresh halaman setelah koneksi pulih</li>
        <li>Beberapa halaman mungkin tersimpan offline</li>
      </ul>
    </div>
    
    <button class="button" onclick="window.location.reload()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
      </svg>
      Coba Lagi
    </button>
    
    <div class="contact">
      <p>Butuh bantuan segera?</p>
      <a href="https://wa.me/6285738602255?text=Halo, saya menghubungi dari website.">Hubungi via WhatsApp</a>
    </div>
  </div>
</body>
</html>
